name: Nightly Dashboard Refresh

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Fetch Yahoo data and update dashboard
        env:
          YAHOO_COOKIE: ${{ secrets.YAHOO_COOKIE }}
        run: |
          python fetch_data.py
        continue-on-error: false

      - name: Commit updated dashboard
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add barry_ballstein.html
          git diff --staged --quiet || git commit -m "Auto-refresh: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
