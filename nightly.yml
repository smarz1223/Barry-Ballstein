name: Nightly Dashboard Refresh

on:
  schedule:
    # Runs every night at 6:00 AM UTC (2:00 AM ET / 11:00 PM PT)
    - cron: '0 6 * * *'

  # Also lets you trigger it manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      # 4. Run the data fetch script
      - name: Fetch Yahoo data and update dashboard
        env:
          YAHOO_COOKIE: ${{ secrets.YAHOO_COOKIE }}
        run: |
          python fetch_data.py

      # 5. Commit and push the updated HTML back to the repo
      - name: Commit updated dashboard
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add barry_ballstein.html
          git diff --staged --quiet || git commit -m "Auto-refresh: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
